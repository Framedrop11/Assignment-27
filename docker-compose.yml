
services:

  mongo:
    image: mongo:7
    container_name: assignment27_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: assignment27_backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/demoDB
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: assignment27_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo_data:
